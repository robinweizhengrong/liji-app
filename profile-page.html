<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人主页 - 礼纪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; font-size: 14px; color: #333; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #f5f5f5; }
        
        .header {
            background: linear-gradient(135deg, #5a6c7d 0%, #3d4f5f 100%);
            padding: 30px 20px;
            text-align: center;
            color: #fff;
        }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .name { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
        .role { display: inline-block; background: rgba(255,255,255,0.2); padding: 4px 15px; border-radius: 15px; font-size: 13px; }
        
        .stats-bar {
            display: flex;
            background: #fff;
            padding: 20px 0;
            margin-bottom: 10px;
        }
        .stat-box { flex: 1; text-align: center; }
        .stat-num { font-size: 24px; font-weight: 600; color: #333; }
        .stat-label { font-size: 12px; color: #999; margin-top: 5px; }
        
        .section { background: #fff; margin-bottom: 10px; padding: 15px; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        
        .work-item {
            display: flex;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f5f5f5;
        }
        .work-image {
            width: 100px;
            height: 75px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-right: 12px;
        }
        .work-info { flex: 1; }
        .work-title { font-weight: 500; margin-bottom: 5px; }
        .work-meta { font-size: 12px; color: #999; }
        
        .edit-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #5a6c7d;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(90, 108, 125, 0.4);
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="avatar">👤</div>
            <div class="name">礼仪师 张明</div>
            <div class="role">高级礼仪师 · 从业8年</div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-num">312</div>
                <div class="stat-label">服务场次</div>
            </div>
            <div class="stat-box">
                <div class="stat-num">156</div>
                <div class="stat-label">粉丝</div>
            </div>
            <div class="stat-box">
                <div class="stat-num">23</div>
                <div class="stat-label">关注</div>
            </div>
            <div class="stat-box">
                <div class="stat-num">48</div>
                <div class="stat-label">获赞</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">作品展示</div>
            
            <div class="work-item">
                <div class="work-image">🕯️</div>
                <div class="work-info">
                    <div class="work-title">张老先生告别仪式</div>
                    <div class="work-meta">2026-02-28 · 达州市殡仪馆 · 156次浏览</div>
                </div>
            </div>
            
            <div class="work-item">
                <div class="work-image">🌸</div>
                <div class="work-info">
                    <div class="work-title">李女士守灵服务</div>
                    <div class="work-meta">2026-02-26 · 仙鹤陵园 · 89次浏览</div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">个人简介</div>
            <p style="color:#666;line-height:1.8;">
                从事生命礼仪服务8年，服务超过300场告别仪式。专业、细致、用心，致力于为每一位逝者送上最庄重的告别，为每一位家属提供最贴心的服务。
            </p>
        </div>
        
        <div class="edit-btn" onclick="alert('编辑个人资料')">✏️</div>
    </div>
</body>
</html>
