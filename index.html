<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="format-detection" content="telephone=no">
    <title>礼纪 - 生命礼仪服务平台</title>
    <style>

        .header { background: #fff; padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        .header-title { font-size: 18px; font-weight: 600; }
        .nav { display: flex; justify-content: space-around; padding: 10px; background: #fff; margin-top: 10px; }
        .nav-item { padding: 10px 20px; color: #666; text-decoration: none; }
        .nav-item.active { color: #1a5f4a; border-bottom: 2px solid #1a5f4a; }
        .content { padding: 10px; }
        .post-card { background: #fff; margin-bottom: 10px; padding: 15px; border-radius: 8px; }
        .loading { text-align: center; padding: 50px; color: #999; }
        .btn { display: inline-block; padding: 10px 20px; background: #1a5f4a; color: #fff; text-decoration: none; border-radius: 4px; margin: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">礼纪</div>
    </div>
    <div class="nav">
        <a href="#" class="nav-item active">首页</a>
        <a href="circle-list.html" class="nav-item">礼仪圈</a>
        <a href="booking.html" class="nav-item">预约</a>
        <a href="chat.html" class="nav-item">我的</a>
    </div>
    <div class="content">
        <div style="text-align: center; padding: 50px 20px;">
            <h2 style="margin-bottom: 20px; color: #1a5f4a;">生命礼仪服务平台</h2>

            <a href="circle-list.html" class="btn">进入礼仪圈</a>
            <a href="booking.html" class="btn">立即预约</a>
        </div>
        
        <div style="background: #fff; padding: 20px; border-radius: 8px; margin-top: 20px;">
            <h3 style="margin-bottom: 15px; color: #333;">服务分类</h3>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">

                <div style="text-align: center; padding: 15px; background: #f5f5f5; border-radius: 8px;">遗体整容</div>
                <div style="text-align: center; padding: 15px; background: #f5f5f5; border-radius: 8px;">灵堂布置</div>
                <div style="text-align: center; padding: 15px; background: #f5f5f5; border-radius: 8px;">丧葬摄影</div>
                <div style="text-align: center; padding: 15px; background: #f5f5f5; border-radius: 8px;">殡葬摄像</div>
