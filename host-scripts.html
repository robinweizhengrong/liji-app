<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>主持词库 - 礼纪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; font-size: 14px; color: #333; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #fff; }
        
        .header {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { font-size: 24px; margin-right: 10px; cursor: pointer; }
        .header-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
        
        .category-list { padding: 15px; }
        .category-item {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .category-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 12px;
        }
        .category-title { font-size: 16px; font-weight: 600; }
        .category-desc { font-size: 13px; color: #999; }
        .category-count {
            margin-left: auto;
            background: #eef2f5;
            color: #5a6c7d;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <span class="back-btn" onclick="history.back()">‹</span>
            <span class="header-title">主持词库</span>
            <span style="width:24px;"></span>
        </div>
        
        <div class="category-list">
            <div class="category-item" onclick="location.href='script-detail.html?type=farewell'">
                <div class="category-header">
                    <div class="category-icon" style="background:#e8f5e9;">🙏</div>
                    <div>
                        <div class="category-title">告别仪式主持词</div>
                        <div class="category-desc">标准告别仪式全流程台词</div>
                    </div>
                    <span class="category-count">12篇</span>
                </div>
            </div>
            
            <div class="category-item" onclick="location.href='script-detail.html?type=vigil'">
                <div class="category-header">
                    <div class="category-icon" style="background:#e3f2fd;">🌙</div>
                    <div>
                        <div class="category-title">守灵主持词</div>
                        <div class="category-desc">守灵仪式专用主持词</div>
                    </div>
                    <span class="category-count">8篇</span>
                </div>
            </div>
            
            <div class="category-item" onclick="location.href='script-detail.html?type=funeral'">
                <div class="category-header">
                    <div class="category-icon" style="background:#fff3e0;">⚰️</div>
                    <div>
                        <div class="category-title">出殡主持词</div>
                        <div class="category-desc">出殡仪式主持词模板</div>
                    </div>
                    <span class="category-count">6篇</span>
                </div>
            </div>
            
            <div class="category-item" onclick="location.href='script-detail.html?type=burial'">
                <div class="category-header">
                    <div class="category-icon" style="background:#f3e5f5;">🌱</div>
                    <div>
                        <div class="category-title">下葬主持词</div>
                        <div class="category-desc">下葬仪式专用主持词</div>
                    </div>
                    <span class="category-count">5篇</span>
                </div>
            </div>
            
            <div class="category-item" onclick="location.href='script-detail.html?type=memorial'">
                <div class="category-header">
                    <div class="category-icon" style="background:#ffebee;">🕯️</div>
                    <div>
                        <div class="category-title">祭祀主持词</div>
                        <div class="category-desc">祭祀仪式主持词</div>
                    </div>
                    <span class="category-count">10篇</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
