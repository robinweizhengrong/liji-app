<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教学资料库 - 礼纪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; font-size: 14px; color: #333; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #fff; }
        
        /* 顶部导航 */
        .header {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { font-size: 24px; margin-right: 10px; cursor: pointer; }
        .header-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
        .header-action { font-size: 14px; color: #5a6c7d; }
        
        /* 分类标签 */
        .category-tabs {
            display: flex;
            background: #fff;
            padding: 0 15px;
            border-bottom: 1px solid #f0f0f0;
            overflow-x: auto;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tab {
            padding: 12px 15px;
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            position: relative;
        }
        .category-tab.active {
            color: #5a6c7d;
            font-weight: 500;
        }
        .category-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15px;
            right: 15px;
            height: 2px;
            background: #5a6c7d;
        }
        
        /* 搜索框 */
        .search-box {
            padding: 15px;
            background: #fff;
        }
        .search-wrapper {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 20px;
            padding: 10px 15px;
        }
        .search-icon { color: #999; margin-right: 8px; }
        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
        }
        
        /* 资料列表 */
        .material-list { padding: 0 15px 80px; }
        .material-item {
            background: #fff;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .material-cover {
            height: 160px;
            background: linear-gradient(135deg, #5a6c7d 0%, #3d4f5f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .material-cover.free::after {
            content: '免费';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #27ae60;
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .material-cover.vip::after {
            content: 'VIP';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e6a23c;
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .cover-icon { font-size: 48px; color: rgba(255,255,255,0.8); }
        .play-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .material-info { padding: 15px; }
        .material-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .material-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 12px;
            color: #999;
        }
        .material-meta span { display: flex; align-items: center; gap: 4px; }
        .material-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-top: 1px solid #f5f5f5;
        }
        .material-author { display: flex; align-items: center; gap: 8px; }
        .author-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .author-name { font-size: 13px; color: #666; }
        .material-action {
            padding: 6px 15px;
            background: #5a6c7d;
            color: #fff;
            border-radius: 15px;
            font-size: 13px;
        }
        .material-action.locked {
            background: #e0e0e0;
            color: #999;
        }
        
        /* 底部按钮 */
        .fab-btn {
            position: fixed;
            bottom: 25px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #5a6c7d;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(90, 108, 125, 0.4);
            z-index: 50;
            cursor: pointer;
        }
        
        /* 上传弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 430px;
            border-radius: 20px 20px 0 0;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { font-size: 17px; font-weight: 600; }
        .modal-close { font-size: 24px; color: #999; cursor: pointer; }
        .modal-body { padding: 15px; }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
        }
        .form-textarea { min-height: 100px; resize: vertical; }
        .upload-area {
            border: 2px dashed #e0e0e0;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
        }
        .upload-icon { font-size: 40px; color: #ccc; margin-bottom: 10px; }
        .upload-text { font-size: 14px; color: #999; }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #5a6c7d;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 25px;
            border-radius: 8px;
            z-index: 10000;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <span class="back-btn" onclick="history.back()">‹</span>
            <span class="header-title">教学资料库</span>
            <span class="header-action" onclick="showUploadModal()">上传</span>
        </div>
        
        <div class="category-tabs">
            <div class="category-tab active">全部</div>
            <div class="category-tab">主持词</div>
            <div class="category-tab">悼词</div>
            <div class="category-tab">流程</div>
            <div class="category-tab">视频课</div>
            <div class="category-tab">音频</div>
        </div>
        
        <div class="search-box">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="搜索教学资料">
            </div>
        </div>
        
        <div class="material-list">
            <!-- 免费资料 -->
            <div class="material-item">
                <div class="material-cover free">
                    <span class="cover-icon">📜</span>
                </div>
                <div class="material-info">
                    <div class="material-title">告别仪式主持词模板</div>
                    <div class="material-meta">
                        <span>👁 2.3k</span>
                        <span>⬇️ 156</span>
                        <span>📄 文档</span>
                    </div>
                </div>
                <div class="material-footer">
                    <div class="material-author">
                        <div class="author-avatar">👤</div>
                        <span class="author-name">礼纪官方</span>
                    </div>
                    <div class="material-action">查看</div>
                </div>
            </div>
            
            <!-- VIP视频课 -->
            <div class="material-item">
                <div class="material-cover vip">
                    <span class="play-btn">▶️</span>
                </div>
                <div class="material-info">
                    <div class="material-title">生命礼仪主持基础课程</div>
                    <div class="material-meta">
                        <span>👁 1.8k</span>
                        <span>⏱ 120分钟</span>
                        <span>🎥 视频</span>
                    </div>
                </div>
                <div class="material-footer">
                    <div class="material-author">
                        <div class="author-avatar">👤</div>
                        <span class="author-name">张明德老师</span>
                    </div>
                    <div class="material-action locked">🔒 VIP</div>
                </div>
            </div>
            
            <!-- 免费音频 -->
            <div class="material-item">
                <div class="material-cover free">
                    <span class="cover-icon">🎵</span>
                </div>
                <div class="material-info">
                    <div class="material-title">哀乐合集（传统&现代）</div>
                    <div class="material-meta">
                        <span>👁 3.5k</span>
                        <span>⬇️ 289</span>
                        <span>🎵 音频</span>
                    </div>
                </div>
                <div class="material-footer">
                    <div class="material-author">
                        <div class="author-avatar">👤</div>
                        <span class="author-name">礼纪官方</span>
                    </div>
                    <div class="material-action">播放</div>
                </div>
            </div>
            
            <!-- VIP文档 -->
            <div class="material-item">
                <div class="material-cover vip">
                    <span class="cover-icon">📋</span>
                </div>
                <div class="material-info">
                    <div class="material-title">守灵仪式全流程指南</div>
                    <div class="material-meta">
                        <span>👁 892</span>
                        <span>⬇️ 67</span>
                        <span>📄 文档</span>
                    </div>
                </div>
                <div class="material-footer">
                    <div class="material-author">
                        <div class="author-avatar">👤</div>
                        <span class="author-name">王德贵老师</span>
                    </div>
                    <div class="material-action locked">🔒 VIP</div>
                </div>
            </div>
        </div>
        
        <div class="fab-btn" onclick="showUploadModal()">+</div>
        
        <!-- 上传弹窗 -->
        <div class="modal" id="upload-modal" onclick="closeModal(event)">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="modal-title">上传教学资料</span>
                    <span class="modal-close" onclick="closeModalDirect()">✕</span>
                </div>
                
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">资料标题</label>
                        <input type="text" class="form-input" placeholder="请输入资料标题">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">分类</label>
                        <select class="form-select">
                            <option>请选择分类</option>
                            <option>主持词</option>
                            <option>悼词</option>
                            <option>流程指南</option>
                            <option>视频课程</option>
                            <option>音频</option>
                            <option>其他</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">上传文件</label>
                        <div class="upload-area" onclick="selectFile()">
                            <div class="upload-icon">📁</div>
                            <div class="upload-text">点击选择文件或拖拽到此处</div>
                            <div style="font-size:12px;color:#999;margin-top:5px;">支持：视频(MP4)、音频(MP3)、文档(PDF/Word)</div>
                        </div>
                        <input type="file" id="file-input" style="display:none;" accept=".mp4,.mp3,.pdf,.doc,.docx">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">资料说明</label>
                        <textarea class="form-textarea" placeholder="请简要介绍这份资料的内容"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">权限设置</label>
                        <select class="form-select">
                            <option value="free">免费公开</option>
                            <option value="vip">VIP专享</option>
                        </select>
                    </div>
                    
                    <button class="btn-primary" onclick="uploadMaterial()">确认上传</button>
                </div>
            </div>
        </div>
    </div>
    
    
    <script>
        function showUploadModal() {
            document.getElementById('upload-modal').classList.add('active');
        }
        
        function closeModal(e) {
            if (e.target === document.getElementById('upload-modal')) {
                document.getElementById('upload-modal').classList.remove('active');
            }
        }
        
        function closeModalDirect() {
            document.getElementById('upload-modal').classList.remove('active');
        }
        
        function selectFile() {
            document.getElementById('file-input').click();
        }
        
        function uploadMaterial() {
            showToast('上传功能开发中，敬请期待');
            closeModalDirect();
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // 文件选择监听
        document.getElementById('file-input').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                showToast('已选择文件：' + e.target.files[0].name);
            }
        });
    </script>
</body>
</html>
