<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 礼纪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #5a6c7d 0%, #3d4f5f 100%); min-height: 100vh; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        
        .logo-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #fff;
        }
        .logo { font-size: 80px; margin-bottom: 20px; }
        .app-name { font-size: 32px; font-weight: 600; margin-bottom: 10px; }
        .app-slogan { font-size: 14px; opacity: 0.8; }
        
        .form-section {
            background: #fff;
            border-radius: 20px 20px 0 0;
            padding: 30px 25px 40px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid #f0f0f0;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-size: 16px;
            color: #999;
            position: relative;
        }
        .tab.active {
            color: #5a6c7d;
            font-weight: 600;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 30%;
            right: 30%;
            height: 2px;
            background: #5a6c7d;
        }
        
        .form-group { margin-bottom: 20px; }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 0 15px;
        }
        .input-icon { font-size: 20px; color: #999; margin-right: 10px; }
        .form-input {
            flex: 1;
            padding: 15px 0;
            border: none;
            background: transparent;
            font-size: 15px;
        }
        
        .verify-row { display: flex; gap: 10px; }
        .verify-row .input-wrapper { flex: 1; }
        .verify-btn {
            padding: 0 20px;
            background: #5a6c7d;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            white-space: nowrap;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #5a6c7d;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }
        
        .other-options {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }
        .divider span {
            background: #fff;
            padding: 0 15px;
            position: relative;
            color: #999;
            font-size: 13px;
        }
        
        .social-login {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        
        .agreement {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
        .agreement a { color: #5a6c7d; }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 25px;
            border-radius: 8px;
            z-index: 10000;
            font-size: 14px;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app">
        <div class="logo-section">
            <div class="logo">🕯️</div>
            <div class="app-name">礼纪</div>
            <div class="app-slogan">生命礼仪服务平台</div>
        </div>
        
        <div class="form-section">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')" id="tab-login">登录</div>
                <div class="tab" onclick="switchTab('register')" id="tab-register">注册</div>
            </div>
            
            <!-- 登录表单 -->
            <div id="login-form">
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">📱</span>
                        <input type="tel" class="form-input" id="login-phone" placeholder="请输入手机号" maxlength="11">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" class="form-input" id="login-password" placeholder="请输入密码">
                    </div>
                </div>
                
                <button class="submit-btn" onclick="doLogin()">登 录</button>
                
                <div class="other-options">
                    <span>忘记密码？</span>
                    <span>验证码登录</span>
                </div>
            </div>
            
            <!-- 注册表单 -->
            <div id="register-form" class="hidden">
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" class="form-input" id="reg-name" placeholder="请输入姓名">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">📱</span>
                        <input type="tel" class="form-input" id="reg-phone" placeholder="请输入手机号" maxlength="11">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="verify-row">
                        <div class="input-wrapper">
                            <span class="input-icon">🔢</span>
                            <input type="text" class="form-input" id="reg-code" placeholder="验证码" maxlength="6">
                        </div>
                        <button class="verify-btn" onclick="sendCode()">获取验证码</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" class="form-input" id="reg-password" placeholder="设置密码（6-20位）">
                    </div>
                </div>
                
                <button class="submit-btn" onclick="doRegister()">注 册</button>
                
                <div class="agreement">
                    注册即表示同意<a href="#">《用户协议》</a>和<a href="#">《隐私政策》</a>
                </div>
            </div>
            
            <div class="divider">
                <span>其他登录方式</span>
            </div>
            
            <div class="social-login">
                <div class="social-btn" onclick="showToast('微信登录')">💬</div>
                <div class="social-btn" onclick="showToast('QQ登录')">🐧</div>
                <div class="social-btn" onclick="showToast('苹果登录')">🍎</div>
            </div>
        </div>
    </div>
    
    
    <script>
        const API_BASE = 'http://localhost:3000/api';
        
        function switchTab(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');
            
            if (type === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
            }
        }
        
        async function doLogin() {
            const phone = document.getElementById('login-phone').value;
            const password = document.getElementById('login-password').value;
            
            if (!phone) {
                showToast('请输入手机号');
                return;
            }
            if (!password) {
                showToast('请输入密码');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: phone, password })
                });
                const data = await res.json();
                
                if (data.code === 0) {
                    // 保存登录状态
                    localStorage.setItem('userInfo', JSON.stringify(data.data));
                    showToast('登录成功');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showToast(data.error || '登录失败');
                }
            } catch (e) {
                showToast('网络错误，请稍后重试');
            }
        }
        
        async function doRegister() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const code = document.getElementById('reg-code').value;
            const password = document.getElementById('reg-password').value;
            
            if (!name) {
                showToast('请输入姓名');
                return;
            }
            if (!phone || phone.length !== 11) {
                showToast('请输入正确的手机号');
                return;
            }
            if (!code) {
                showToast('请输入验证码');
                return;
            }
            if (!password || password.length < 6) {
                showToast('密码至少6位');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: name, phone, password })
                });
                const data = await res.json();
                
                if (data.code === 0) {
                    showToast('注册成功');
                    setTimeout(() => {
                        switchTab('login');
                    }, 1000);
                } else {
                    showToast(data.error || '注册失败');
                }
            } catch (e) {
                showToast('网络错误，请稍后重试');
            }
        }
        
        function sendCode() {
            const phone = document.getElementById('reg-phone').value;
            if (!phone || phone.length !== 11) {
                showToast('请输入正确的手机号');
                return;
            }
            showToast('验证码已发送');
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // 检查是否已登录
        document.addEventListener('DOMContentLoaded', () => {
            const userInfo = localStorage.getItem('userInfo');
            if (userInfo) {
                // 已登录，跳转到首页
                // window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
