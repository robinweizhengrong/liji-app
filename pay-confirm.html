<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认支付 - 礼纪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .header { background: #fff; padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; }
        .back { font-size: 20px; margin-right: 10px; cursor: pointer; }
        .title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; }
        
        .order-info { background: #fff; padding: 15px; margin-bottom: 10px; }
        .order-title { font-size: 14px; color: #999; margin-bottom: 10px; }
        .order-item { display: flex; gap: 12px; }
        .order-img { width: 80px; height: 80px; background: #e8e8e8; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .order-detail { flex: 1; }
        .order-name { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
        .order-desc { font-size: 12px; color: #999; margin-bottom: 5px; }
        .order-price { font-size: 16px; color: #e74c3c; font-weight: 600; }
        
        .pay-methods { background: #fff; margin-bottom: 10px; }
        .pay-title { padding: 15px; font-size: 15px; font-weight: 600; border-bottom: 1px solid #f5f5f5; }
        .pay-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
        .pay-icon { width: 32px; height: 32px; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .pay-name { flex: 1; font-size: 15px; }
        .pay-check { width: 20px; height: 20px; border: 2px solid #ddd; border-radius: 50%; }
        .pay-item.active .pay-check { background: #5a6c7d; border-color: #5a6c7d; }
        
        .coupon-section { background: #fff; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .coupon-label { font-size: 15px; }
        .coupon-value { color: #e74c3c; font-size: 14px; }
        
        .amount-section { background: #fff; padding: 15px; margin-bottom: 80px; }
        .amount-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .amount-label { color: #666; }
        .amount-value { color: #333; }
        .amount-total { display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid #f5f5f5; font-size: 16px; font-weight: 600; }
        .total-value { color: #e74c3c; font-size: 20px; }
        
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 10px 15px; border-top: 1px solid #eee; display: flex; align-items: center; }
        .pay-amount { flex: 1; }
        .pay-label { font-size: 12px; color: #999; }
        .pay-number { font-size: 20px; color: #e74c3c; font-weight: 600; }
        .pay-btn { padding: 12px 40px; background: #5a6c7d; color: #fff; border-radius: 25px; font-size: 16px; border: none; }
        
        /* 支付密码弹窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; }
        .modal-content { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; padding: 20px; }
        .modal-title { text-align: center; font-size: 16px; font-weight: 600; margin-bottom: 20px; }
        .password-input { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .password-dot { width: 50px; height: 50px; border: 1px solid #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #ddd; }
        .key { padding: 20px; background: #fff; text-align: center; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="back" onclick="history.back()">←</span>
        <span class="title">确认支付</span>
        <span style="width:30px;"></span>
    </div>
    
    <div class="order-info">
        <div class="order-title">订单信息</div>
        <div class="order-item">
            <div class="order-img">👤</div>
            <div class="order-detail">
                <div class="order-name">策划师服务 - 张明</div>
                <div class="order-desc">基础策划服务 · 成都市</div>
                <div class="order-price">¥800.00</div>
            </div>
        </div>
    </div>
    
    <div class="pay-methods">
        <div class="pay-title">支付方式</div>
        
        <div class="pay-item active" onclick="selectPay(this)">
            <div class="pay-icon">💚</div>
            <div class="pay-name">微信支付</div>
            <div class="pay-check"></div>
        </div>
        
        <div class="pay-item" onclick="selectPay(this)">
            <div class="pay-icon">🔵</div>
            <div class="pay-name">支付宝</div>
            <div class="pay-check"></div>
        </div>
        
        <div class="pay-item" onclick="selectPay(this)">
            <div class="pay-icon">💳</div>
            <div class="pay-name">银行卡支付</div>
            <div class="pay-check"></div>
        </div>
    </div>
    
    <div class="coupon-section">
        <span class="coupon-label">优惠券</span>
        <span class="coupon-value">无可用优惠券 ›</span>
    </div>
    
    <div class="amount-section">
        <div class="amount-row">
            <span class="amount-label">商品金额</span>
            <span class="amount-value">¥800.00</span>
        </div>
        <div class="amount-row">
            <span class="amount-label">优惠金额</span>
            <span class="amount-value">-¥0.00</span>
        </div>
        <div class="amount-total">
            <span>实付金额</span>
            <span class="total-value">¥800.00</span>
        </div>
    </div>
    
    <div class="bottom-bar">
        <div class="pay-amount">
            <div class="pay-label">实付金额</div>
            <div class="pay-number">¥800.00</div>
        </div>
        <button class="pay-btn" onclick="showPayModal()">立即支付</button>
    </div>
    
    <!-- 支付密码弹窗（预留接口） -->
    <div class="modal" id="payModal">
        <div class="modal-content">
            <div class="modal-title">请输入支付密码</div>
            <div class="password-input">
                <div class="password-dot"></div>
                <div class="password-dot"></div>
                <div class="password-dot"></div>
                <div class="password-dot"></div>
                <div class="password-dot"></div>
                <div class="password-dot"></div>
            </div>
            <div style="text-align:center;color:#999;font-size:12px;margin-bottom:20px;">
                安全支付环境（接口预留）
            </div>
            
            <div class="keyboard">
                <div class="key">1</div>
                <div class="key">2</div>
                <div class="key">3</div>
                <div class="key">4</div>
                <div class="key">5</div>
                <div class="key">6</div>
                <div class="key">7</div>
                <div class="key">8</div>
                <div class="key">9</div>
                <div class="key"></div>
                <div class="key">0</div>
                <div class="key" onclick="closeModal()">⌫</div>
            </div>
        </div>
    </div>
    
    <script>
        function selectPay(element) {
            document.querySelectorAll('.pay-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        }
        
        function showPayModal() {
            document.getElementById('payModal').style.display = 'block';
            // TODO: 调用支付接口
            // 此处预留支付接口，由用户后续接入微信支付/支付宝
        }
        
        function closeModal() {
            document.getElementById('payModal').style.display = 'none';
        }
        
        // 点击空白处关闭弹窗
        document.getElementById('payModal').onclick = function(e) {
            if (e.target === this) {
                closeModal();
            }
        }
    </script>
</body>
</html>
