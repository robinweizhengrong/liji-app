<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 礼纪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .header { background: #fff; padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .back { font-size: 20px; margin-right: 10px; text-decoration: none; color: #333; cursor: pointer; }
        .title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #f0f0f0; }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 14px; color: #666; position: relative; }
        .tab.active { color: #5a6c7d; font-weight: 600; }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 30%; right: 30%; height: 2px; background: #5a6c7d; }
        .order-list { padding: 10px; }
        .order-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: #999; }
        .order-status { color: #5a6c7d; font-weight: 600; }
        .order-content { display: flex; gap: 12px; margin-bottom: 12px; }
        .order-avatar { width: 60px; height: 60px; border-radius: 8px; background: #5a6c7d; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
        .order-info { flex: 1; }
        .order-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .order-desc { font-size: 12px; color: #999; }
        .order-price { text-align: right; }
        .order-amount { font-size: 16px; font-weight: 600; color: #333; }
        .order-count { font-size: 12px; color: #999; }
        .order-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 10px; border-top: 1px solid #f5f5f5; }
        .btn-outline { padding: 6px 14px; border: 1px solid #ddd; border-radius: 15px; font-size: 13px; color: #666; }
        .btn-primary { padding: 6px 14px; background: #5a6c7d; color: #fff; border-radius: 15px; font-size: 13px; }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 20px; }
        .empty-text { color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="back" onclick="history.back()">←</span>
        <span class="title">我的订单</span>
        <span style="width:30px;"></span>
    </div>
    
    <div class="tabs">
        <div class="tab active">全部</div>
        <div class="tab">待付款</div>
        <div class="tab">进行中</div>
        <div class="tab">已完成</div>
    </div>
    
    <div class="order-list">
        <div class="order-card">
            <div class="order-header">
                <span>订单号：LJ202602270001</span>
                <span class="order-status">进行中</span>
            </div>
            <div class="order-content">
                <div class="order-avatar">张</div>
                <div class="order-info">
                    <div class="order-name">策划师服务 - 张明</div>
                    <div class="order-desc">基础策划服务 · 2026-02-27</div>
                </div>
                <div class="order-price">
                    <div class="order-amount">¥800</div>
                    <div class="order-count">x1</div>
                </div>
            </div>
            <div class="order-actions">
                <div class="btn-outline">联系服务</div>
                <div class="btn-outline">查看详情</div>
                <div class="btn-primary">确认完成</div>
            </div>
        </div>
        
        <div class="order-card">
            <div class="order-header">
                <span>订单号：LJ202602200002</span>
                <span class="order-status" style="color:#999;">已完成</span>
            </div>
            <div class="order-content">
                <div class="order-avatar">李</div>
                <div class="order-info">
                    <div class="order-name">主持人服务 - 李华</div>
                    <div class="order-desc">标准主持服务 · 2026-02-20</div>
                </div>
                <div class="order-price">
                    <div class="order-amount">¥1200</div>
                    <div class="order-count">x1</div>
                </div>
            </div>
            <div class="order-actions">
                <div class="btn-outline">再次预约</div>
                <div class="btn-outline">评价</div>
            </div>
        </div>
        
        <div class="order-card">
            <div class="order-header">
                <span>订单号：LJ202602150003</span>
                <span class="order-status" style="color:#e74c3c;">待付款</span>
            </div>
            <div class="order-content">
                <div class="order-avatar">王</div>
                <div class="order-info">
                    <div class="order-name">礼仪师服务 - 王芳</div>
                    <div class="order-desc">礼仪服务套餐 · 2026-02-15</div>
                </div>
                <div class="order-price">
                    <div class="order-amount">¥600</div>
                    <div class="order-count">x1</div>
                </div>
            </div>
            <div class="order-actions">
                <div class="btn-outline">取消订单</div>
                <div class="btn-primary">立即付款</div>
            </div>
        </div>
    </div>
</body>
</html>
