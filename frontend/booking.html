<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>确认订单 - 礼纪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; font-size: 14px; color: #333; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #f5f5f5; }
        
        /* 顶部导航 */
        .header {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .header-title { flex: 1; text-align: center; font-size: 16px; font-weight: 600; }
        
        /* 服务信息 */
        .service-info-card {
            background: #fff;
            margin: 10px;
            padding: 15px;
            border-radius: 12px;
        }
        .service-header { display: flex; gap: 12px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f5f5f5; }
        .service-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            flex-shrink: 0;
        }
        .service-detail { flex: 1; }
        .service-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .service-type { color: #666; font-size: 13px; }
        .service-price { color: #ff6b6b; font-size: 18px; font-weight: 600; margin-top: 8px; }
        
        /* 表单 */
        .form-card {
            background: #fff;
            margin: 10px;
            padding: 15px;
            border-radius: 12px;
        }
        .form-title { font-size: 15px; font-weight: 600; margin-bottom: 15px; }
        .form-item { margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
        }
        .form-input:focus { outline: none; border-color: #667eea; background: #fff; }
        
        /* 时间选择 */
        .date-selector {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .date-item {
            min-width: 70px;
            padding: 12px 8px;
            background: #f5f5f5;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .date-item.active {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }
        .date-weekday { font-size: 11px; margin-bottom: 4px; }
        .date-day { font-size: 16px; font-weight: 600; }
        
        .time-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .time-item {
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .time-item.active {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }
        .time-item.disabled {
            background: #eee;
            color: #999;
            cursor: not-allowed;
        }
        
        /* 备注 */
        .remark-input {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            background: #fafafa;
        }
        
        /* 价格明细 */
        .price-card {
            background: #fff;
            margin: 10px;
            padding: 15px;
            border-radius: 12px;
        }
        .price-title { font-size: 15px; font-weight: 600; margin-bottom: 15px; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .price-row.total { 
            border-top: 1px solid #f0f0f0; 
            padding-top: 15px; 
            margin-top: 15px;
            font-size: 16px;
            font-weight: 600;
        }
        .price-value { color: #ff6b6b; }
        .price-value.total { font-size: 20px; }
        
        /* 支付方式 */
        .payment-card {
            background: #fff;
            margin: 10px;
            padding: 15px;
            border-radius: 12px;
        }
        .payment-title { font-size: 15px; font-weight: 600; margin-bottom: 15px; }
        .payment-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .payment-item.selected { border-color: #667eea; background: #f8f8ff; }
        .payment-icon { 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px;
            margin-right: 12px;
        }
        .payment-icon.wechat { background: #07c160; color: #fff; }
        .payment-icon.alipay { background: #1677ff; color: #fff; }
        .payment-info { flex: 1; }
        .payment-name { font-size: 15px; font-weight: 500; }
        .payment-desc { font-size: 12px; color: #999; margin-top: 2px; }
        .payment-check { 
            width: 20px; 
            height: 20px; 
            border: 2px solid #ddd; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .payment-item.selected .payment-check { 
            background: #667eea; 
            border-color: #667eea; 
            color: #fff;
        }
        
        /* 协议 */
        .agreement {
            margin: 10px;
            padding: 0 5px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 12px;
            color: #666;
        }
        .agreement input { margin-top: 2px; }
        .agreement a { color: #667eea; }
        
        /* 底部支付栏 */
        .pay-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-top: 1px solid #f0f0f0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        .pay-info { flex: 1; }
        .pay-label { font-size: 12px; color: #666; }
        .pay-amount { font-size: 20px; font-weight: 700; color: #ff6b6b; }
        .pay-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .pay-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .content-area { padding-bottom: 100px; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="back-btn" onclick="history.back()">←</div>
            <div class="header-title">确认订单</div>
            <div style="width: 36px;"></div>
        </div>
        
        <div class="content-area">
            <!-- 服务信息 -->
            <div class="service-info-card">
                <div class="service-header">
                    <div class="service-avatar" id="providerAvatar">张</div>
                    <div class="service-detail">
                        <div class="service-name" id="providerName">张明远</div>
                        <div class="service-type" id="serviceType">标准礼仪服务</div>
                        <div class="service-price" id="servicePrice">¥1,500</div>
                    </div>
                </div>
            </div>
            
            <!-- 服务时间 -->
            <div class="form-card">
                <div class="form-title">选择服务时间</div>
                
                <div class="form-label">日期</div>
                <div class="date-selector" id="dateSelector">
                    <!-- 动态生成 -->
                </div>
                
                <div class="form-label" style="margin-top: 15px;">时间段</div>
                <div class="time-selector" id="timeSelector">
                    <div class="time-item" data-time="08:00">08:00</div>
                    <div class="time-item" data-time="09:00">09:00</div>
                    <div class="time-item" data-time="10:00">10:00</div>
                    <div class="time-item" data-time="11:00">11:00</div>
                    <div class="time-item" data-time="13:00">13:00</div>
                    <div class="time-item" data-time="14:00">14:00</div>
                    <div class="time-item" data-time="15:00">15:00</div>
                    <div class="time-item" data-time="16:00">16:00</div>
                </div>
            </div>
            
            <!-- 联系人信息 -->
            <div class="form-card">
                <div class="form-title">联系人信息</div>
                
                <div class="form-item">
                    <label class="form-label">联系人姓名 *</label>
                    <input type="text" class="form-input" id="contactName" placeholder="请输入联系人姓名">
                </div>
                
                <div class="form-item">
                    <label class="form-label">手机号码 *</label>
                    <input type="tel" class="form-input" id="contactPhone" placeholder="请输入手机号码">
                </div>
                
                <div class="form-item">
                    <label class="form-label">服务地址 *</label>
                    <input type="text" class="form-input" id="serviceAddress" placeholder="请输入详细地址">
                </div>
                
                <div class="form-item">
                    <label class="form-label">备注信息</label>
                    <textarea class="remark-input" id="remark" placeholder="如有特殊需求，请在此说明"></textarea>
                </div>
            </div>
            
            <!-- 价格明细 -->
            <div class="price-card">
                <div class="price-title">价格明细</div>
                <div class="price-row">
                    <span>服务费用</span>
                    <span id="basePrice">¥1,500</span>
                </div>
                <div class="price-row">
                    <span>平台服务费</span>
                    <span>¥0</span>
                </div>
                <div class="price-row">
                    <span>优惠</span>
                    <span style="color: #52c41a;">-¥0</span>
                </div>
                <div class="price-row total">
                    <span>合计</span>
                    <span class="price-value total" id="totalPrice">¥1,500</span>
                </div>
            </div>
            
            <!-- 支付方式 -->
            <div class="payment-card">
                <div class="payment-title">支付方式</div>
                
                <div class="payment-item selected" onclick="selectPayment('wechat', this)">
                    <div class="payment-icon wechat">💬</div>
                    <div class="payment-info">
                        <div class="payment-name">微信支付</div>
                        <div class="payment-desc">推荐使用</div>
                    </div>
                    <div class="payment-check">✓</div>
                </div>
                
                <div class="payment-item" onclick="selectPayment('alipay', this)">
                    <div class="payment-icon alipay">💎</div>
                    <div class="payment-info">
                        <div class="payment-name">支付宝</div>
                        <div class="payment-desc">数亿用户的选择</div>
                    </div>
                    <div class="payment-check"></div>
                </div>
            </div>
            
            <!-- 协议 -->
            <div class="agreement">
                <input type="checkbox" id="agreement" checked>
                <label for="agreement">我已阅读并同意 <a href="#">《服务协议》</a> 和 <a href="#">《隐私政策》</a>，确认以上信息真实有效。</label>
            </div>
        </div>
        
        <!-- 底部支付栏 -->
        <div class="pay-bar">
            <div class="pay-info">
                <div class="pay-label">实付金额</div>
                <div class="pay-amount" id="payAmount">¥1,500</div>
            </div>
            <button class="pay-btn" onclick="submitOrder()">确认支付</button>
        </div>
    </div>
    
    <script>
        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const providerName = urlParams.get('provider') || '张明远';
        const serviceName = urlParams.get('service') || '标准礼仪服务';
        const price = 1500;
        
        // 设置页面信息
        document.getElementById('providerName').textContent = providerName;
        document.getElementById('serviceType').textContent = serviceName;
        document.getElementById('providerAvatar').textContent = providerName.charAt(0);
        
        // 生成日期选择
        const dateSelector = document.getElementById('dateSelector');
        const today = new Date();
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        
        for (let i = 0; i < 7; i++) {
            const date = new Date(today);
            date.setDate(today.getDate() + i);
            
            const dateItem = document.createElement('div');
            dateItem.className = 'date-item' + (i === 0 ? ' active' : '');
            dateItem.innerHTML = `
                <div class="date-weekday">${i === 0 ? '今天' : weekdays[date.getDay()]}</div>
                <div class="date-day">${date.getDate()}</div>
            `;
            dateItem.onclick = () => {
                document.querySelectorAll('.date-item').forEach(d => d.classList.remove('active'));
                dateItem.classList.add('active');
            };
            dateSelector.appendChild(dateItem);
        }
        
        // 时间选择
        let selectedTime = null;
        document.querySelectorAll('.time-item').forEach(item => {
            item.onclick = () => {
                if (item.classList.contains('disabled')) return;
                document.querySelectorAll('.time-item').forEach(t => t.classList.remove('active'));
                item.classList.add('active');
                selectedTime = item.dataset.time;
            };
        });
        
        // 支付方式选择
        let selectedPayment = 'wechat';
        function selectPayment(type, element) {
            selectedPayment = type;
            document.querySelectorAll('.payment-item').forEach(p => p.classList.remove('selected'));
            element.classList.add('selected');
        }
        
        // 提交订单
        function submitOrder() {
            const name = document.getElementById('contactName').value;
            const phone = document.getElementById('contactPhone').value;
            const address = document.getElementById('serviceAddress').value;
            const agreement = document.getElementById('agreement').checked;
            
            if (!name || !phone || !address) {
                alert('请填写完整的联系人信息');
                return;
            }
            
            if (!selectedTime) {
                alert('请选择服务时间');
                return;
            }
            
            if (!agreement) {
                alert('请阅读并同意服务协议');
                return;
            }
            
            // 创建订单数据
            const orderData = {
                provider: providerName,
                service: serviceName,
                price: price,
                date: document.querySelector('.date-item.active .date-day').textContent,
                time: selectedTime,
                contact: { name, phone, address },
                remark: document.getElementById('remark').value,
                payment: selectedPayment,
                orderId: 'LJ' + Date.now(),
                createTime: new Date().toISOString()
            };
            
            // 保存订单到本地存储
            localStorage.setItem('currentOrder', JSON.stringify(orderData));
            
            // 跳转到支付页面
            window.location.href = `payment.html?orderId=${orderData.orderId}&amount=${price}&type=${selectedPayment}`;
        }
    </script>
</body>
</html>
