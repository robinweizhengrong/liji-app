<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>档期详情 - 礼纪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; font-size: 14px; color: #333; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #fff; }
        
        .header {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { font-size: 24px; margin-right: 10px; cursor: pointer; }
        .header-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
        
        .detail-card {
            background: #fff;
            padding: 20px;
            margin-bottom: 10px;
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .detail-type {
            padding: 6px 15px;
            background: #5a6c7d;
            color: #fff;
            border-radius: 20px;
            font-size: 14px;
        }
        .detail-status {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
        }
        .status-confirmed { background: #e8f5e9; color: #27ae60; }
        
        .detail-info { margin-top: 20px; }
        .info-row {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .info-label { width: 80px; color: #999; }
        .info-value { flex: 1; font-weight: 500; }
        
        .btn-group {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #f0f0f0;
        }
        .btn { flex: 1; padding: 14px; border-radius: 8px; text-align: center; font-size: 15px; cursor: pointer; }
        .btn-outline { border: 1px solid #5a6c7d; color: #5a6c7d; }
        .btn-primary { background: #5a6c7d; color: #fff; border: none; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <span class="back-btn" onclick="history.back()">‹</span>
            <span class="header-title">档期详情</span>
            <span style="width:24px;"></span>
        </div>
        
        <div class="detail-card">
            <div class="detail-header">
                <span class="detail-type">告别仪式</span>
                <span class="detail-status status-confirmed">已确认</span>
            </div>
            
            <div class="detail-info">
                <div class="info-row">
                    <span class="info-label">日期</span>
                    <span class="info-value">2026年2月28日 上午 09:30</span>
                </div>
                <div class="info-row">
                    <span class="info-label">客户</span>
                    <span class="info-value">张老先生家属</span>
                </div>
                <div class="info-row">
                    <span class="info-label">电话</span>
                    <span class="info-value">138****1234</span>
                </div>
                <div class="info-row">
                    <span class="info-label">地点</span>
                    <span class="info-value">达州市殡仪馆</span>
                </div>
                <div class="info-row">
                    <span class="info-label">金额</span>
                    <span class="info-value" style="color:#e67e22;font-weight:600;">¥1,500</span>
                </div>
                <div class="info-row">
                    <span class="info-label">备注</span>
                    <span class="info-value">需要准备鲜花、哀乐</span>
                </div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-outline" onclick="history.back()">返回</button>
            <button class="btn btn-primary" onclick="alert('编辑功能')">编辑</button>
        </div>
    </div>
</body>
</html>
