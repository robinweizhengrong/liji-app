<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的订单 - 礼纪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; font-size: 14px; color: #333; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #f5f5f5; }
        
        /* 顶部导航 */
        .header {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .header-title { flex: 1; text-align: center; font-size: 16px; font-weight: 600; }
        
        /* 状态筛选 */
        .filter-bar {
            background: #fff;
            display: flex;
            overflow-x: auto;
            padding: 0 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .filter-item {
            padding: 15px 20px;
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .filter-item.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 500;
        }
        
        /* 订单列表 */
        .order-list { padding: 10px; }
        .order-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #f5f5f5;
            margin-bottom: 12px;
        }
        .order-id { font-size: 13px; color: #999; }
        .order-status {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        .status-pending { background: #fff7e6; color: #fa8c16; }
        .status-paid { background: #f6ffed; color: #52c41a; }
        .status-serving { background: #e6f7ff; color: #1890ff; }
        .status-completed { background: #f5f5f5; color: #999; }
        
        .order-body { display: flex; gap: 12px; margin-bottom: 12px; }
        .order-avatar {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            flex-shrink: 0;
        }
        .order-info { flex: 1; }
        .order-service { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .order-provider { font-size: 13px; color: #666; margin-bottom: 4px; }
        .order-time { font-size: 12px; color: #999; }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f5f5f5;
        }
        .order-amount { font-size: 15px; }
        .order-amount span { color: #ff6b6b; font-weight: 600; }
        .order-actions { display: flex; gap: 8px; }
        .order-btn {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }
        .empty-icon { font-size: 60px; margin-bottom: 15px; }
        .empty-text { font-size: 15px; color: #666; margin-bottom: 20px; }
        .empty-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 24px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="back-btn" onclick="history.back()">←</div>
            <div class="header-title">我的订单</div>
            <div style="width: 36px;"></div>
        </div>
        
        <!-- 状态筛选 -->
        <div class="filter-bar">
            <div class="filter-item active" data-status="all" onclick="filterOrders('all')">全部</div>
            <div class="filter-item" data-status="pending" onclick="filterOrders('pending')">待支付</div>
            <div class="filter-item" data-status="paid" onclick="filterOrders('paid')">已支付</div>
            <div class="filter-item" data-status="serving" onclick="filterOrders('serving')">服务中</div>
            <div class="filter-item" data-status="completed" onclick="filterOrders('completed')">已完成</div>
        </div>
        
        <!-- 订单列表 -->
        <div class="order-list" id="orderList">
            <!-- 动态生成 -->
        </div>
    </div>
    
    <script>
        // 获取订单数据
        function getOrders() {
            const history = JSON.parse(localStorage.getItem('orderHistory') || '[]');
            
            // 添加一些示例订单
            const demoOrders = [
                {
                    orderId: 'LJ20260227001',
                    provider: '张明远',
                    service: '标准礼仪服务',
                    amount: 1500,
                    status: 'completed',
                    date: '2026-02-27',
                    time: '10:00'
                },
                {
                    orderId: 'LJ20260226002',
                    provider: '李雅琴',
                    service: '主持人服务',
                    amount: 2000,
                    status: 'completed',
                    date: '2026-02-26',
                    time: '14:00'
                }
            ];
            
            return [...history, ...demoOrders];
        }
        
        // 渲染订单列表
        function renderOrders(filter = 'all') {
            const orderList = document.getElementById('orderList');
            const orders = getOrders();
            
            const filteredOrders = filter === 'all' 
                ? orders 
                : orders.filter(o => o.status === filter);
            
            if (filteredOrders.length === 0) {
                orderList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div class="empty-text">暂无${getStatusText(filter)}订单</div>
                        <button class="empty-btn" onclick="goToService()">去预约服务</button>
                    </div>
                `;
                return;
            }
            
            orderList.innerHTML = filteredOrders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-id">订单号：${order.orderId}</div>
                        <div class="order-status ${getStatusClass(order.status)}">${getStatusText(order.status)}</div>
                    </div>
                    
                    <div class="order-body">
                        <div class="order-avatar">${order.provider.charAt(0)}</div>
                        <div class="order-info">
                            <div class="order-service">${order.service}</div>
                            <div class="order-provider">服务者：${order.provider}</div>
                            <div class="order-time">${order.date} ${order.time}</div>
                        </div>
                    </div>
                    
                    <div class="order-footer">
                        <div class="order-amount">
                            合计：<span>¥${order.amount.toLocaleString()}</span>
                        </div>
                        <div class="order-actions">
                            ${getOrderActions(order)}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 获取状态样式
        function getStatusClass(status) {
            const map = {
                'pending': 'status-pending',
                'paid': 'status-paid',
                'serving': 'status-serving',
                'completed': 'status-completed'
            };
            return map[status] || 'status-pending';
        }
        
        // 获取状态文本
        function getStatusText(status) {
            const map = {
                'all': '',
                'pending': '待支付',
                'paid': '已支付',
                'serving': '服务中',
                'completed': '已完成'
            };
            return map[status] || status;
        }
        
        // 获取订单操作按钮
        function getOrderActions(order) {
            if (order.status === 'pending') {
                return `
                    <button class="order-btn btn-secondary" onclick="cancelOrder('${order.orderId}')">取消</button>
                    <button class="order-btn btn-primary" onclick="payOrder('${order.orderId}')">去支付</button>
                `;
            } else if (order.status === 'completed') {
                return `
                    <button class="order-btn btn-secondary" onclick="deleteOrder('${order.orderId}')">删除</button>
                    <button class="order-btn btn-primary" onclick="reviewOrder('${order.orderId}')">评价</button>
                `;
            } else {
                return `
                    <button class="order-btn btn-secondary" onclick="viewDetail('${order.orderId}')">查看详情</button>
                `;
            }
        }
        
        // 筛选订单
        function filterOrders(status) {
            document.querySelectorAll('.filter-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.status === status) {
                    item.classList.add('active');
                }
            });
            renderOrders(status);
        }
        
        // 操作函数
        function cancelOrder(orderId) {
            if (confirm('确定要取消这个订单吗？')) {
                alert('订单已取消');
                renderOrders();
            }
        }
        
        function payOrder(orderId) {
            window.location.href = `payment.html?orderId=${orderId}`;
        }
        
        function deleteOrder(orderId) {
            if (confirm('确定要删除这个订单吗？')) {
                let history = JSON.parse(localStorage.getItem('orderHistory') || '[]');
                history = history.filter(o => o.orderId !== orderId);
                localStorage.setItem('orderHistory', JSON.stringify(history));
                renderOrders();
            }
        }
        
        function reviewOrder(orderId) {
            alert('评价功能开发中');
        }
        
        function viewDetail(orderId) {
            alert('订单详情：' + orderId);
        }
        
        function goToService() {
            window.location.href = 'index.html';
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderOrders();
        });
    </script>
</body>
</html>
