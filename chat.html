<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天 - 礼纪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .header { background: #fff; padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .back { font-size: 20px; margin-right: 10px; cursor: pointer; }
        .user-info { flex: 1; display: flex; align-items: center; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin-right: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 600; }
        .user-detail { flex: 1; }
        .user-name { font-size: 16px; font-weight: 600; }
        .user-status { font-size: 12px; color: #5a6c7d; }
        .more { font-size: 24px; color: #666; }
        
        .chat-container { padding: 15px; padding-bottom: 80px; }
        .time-divider { text-align: center; margin: 15px 0; }
        .time-divider span { font-size: 12px; color: #999; background: #e0e0e0; padding: 4px 10px; border-radius: 10px; }
        
        .message { display: flex; margin-bottom: 15px; }
        .message.self { flex-direction: row-reverse; }
        
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e8e8e8; margin: 0 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .message.self .msg-avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        
        .msg-content { max-width: 70%; }
        .msg-bubble { padding: 12px 15px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-break: break-word; }
        .message:not(.self) .msg-bubble { background: #fff; color: #333; border-bottom-left-radius: 4px; }
        .message.self .msg-bubble { background: #5a6c7d; color: #fff; border-bottom-right-radius: 4px; }
        
        .msg-time { font-size: 11px; color: #999; margin-top: 5px; text-align: right; }
        .message:not(.self) .msg-time { text-align: left; }
        
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 10px 15px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        .voice-btn { font-size: 24px; color: #666; padding: 5px; }
        .input-box { flex: 1; display: flex; background: #f5f5f5; border-radius: 20px; padding: 5px 15px; align-items: center; }
        .input-box input { flex: 1; border: none; background: transparent; font-size: 15px; outline: none; padding: 8px 0; }
        .emoji-btn { font-size: 20px; color: #666; margin-left: 5px; }
        .send-btn { padding: 10px 20px; background: #5a6c7d; color: #fff; border-radius: 20px; font-size: 15px; border: none; }
        
        .service-card { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .service-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .service-info { font-size: 13px; color: #666; margin-bottom: 5px; }
        .service-price { font-size: 16px; color: #e74c3c; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <span class="back" onclick="history.back()">←</span>
        <div class="user-info">
            <div class="user-avatar">张</div>
            <div class="user-detail">
                <div class="user-name">张明</div>
                <div class="user-status">在线</div>
            </div>
        </div>
        <span class="more">⋮</span>
    </div>
    
    <div class="chat-container">
        <div class="time-divider">
            <span>昨天 14:30</span>
        </div>
        
        <div class="message">
            <div class="msg-avatar">张</div>
            <div class="msg-content">
                <div class="msg-bubble">您好，我是策划师张明，请问有什么可以帮助您的？</div>
                <div class="msg-time">14:30</div>
            </div>
        </div>
        
        <div class="message self">
            <div class="msg-avatar">我</div>
            <div class="msg-content">
                <div class="msg-bubble">您好，我想咨询一下策划服务</div>
                <div class="msg-time">14:32</div>
            </div>
        </div>
        
        <div class="message">
            <div class="msg-avatar">张</div>
            <div class="msg-content">
                <div class="msg-bubble">可以的，我们有基础、标准、高端三个档位的服务，您想了解哪个？</div>
                <div class="msg-time">14:33</div>
            </div>
        </div>
        
        <div class="time-divider">
            <span>今天 09:15</span>
        </div>
        
        <div class="message self">
            <div class="msg-avatar">我</div>
            <div class="msg-content">
                <div class="msg-bubble">基础服务都包含哪些内容？</div>
                <div class="msg-time">09:15</div>
            </div>
        </div>
        
        <div class="message">
            <div class="msg-avatar">张</div>
            <div class="msg-content">
                <div class="service-card">
                    <div class="service-title">基础策划服务</div>
                    <div class="service-info">• 告别仪式流程策划</div>
                    <div class="service-info">• 场地布置建议</div>
                    <div class="service-info">• 仪式主持1场</div>
                    <div class="service-price">¥800起</div>
                </div>
                <div class="msg-bubble" style="margin-top:10px;">这是我们的基础服务套餐，您觉得合适吗？</div>
                <div class="msg-time">09:18</div>
            </div>
        </div>
    </div>
    
    <div class="bottom-bar">
        <span class="voice-btn">🎤</span>
        <div class="input-box">
            <input type="text" placeholder="输入消息...">
            <span class="emoji-btn">😊</span>
        </div>
        <button class="send-btn">发送</button>
    </div>
</body>
</html>
